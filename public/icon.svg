<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#311042;stop-opacity:1" />
    </linearGradient>

    <!-- Logo Stroke Gradient (Violet to Pink) -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Star Glow Gradient -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#f472b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.1" />

  <!-- Background Orbits (Decorative Pipeline Paths) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-opacity="0.1" stroke-dasharray="10 15" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#logoGrad)" stroke-width="1" stroke-opacity="0.05" />

  <!-- The "N" Pipeline Path -->
  <g filter="url(#glow)">
    <path d="M 160,360 L 160,180 C 160,160 175,150 190,165 L 310,335 C 325,350 340,340 340,320 L 340,160" 
          fill="none" 
          stroke="url(#logoGrad)" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Upward shooting arrow at the end of the pipeline -->
    <path d="M 340,175 L 340,130 L 385,130" 
          fill="none" 
          stroke="#ec4899" 
          stroke-width="38" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- The "Nova" Star (Brilliant Sparkle at the Peak) -->
  <g transform="translate(340, 130)" filter="url(#glow)">
    <!-- Glow aura -->
    <circle cx="0" cy="0" r="50" fill="url(#starGlow)" opacity="0.6" />
    
    <!-- 4-point Sparkle Star -->
    <path d="M 0,-45 Q 0,0 45,0 Q 0,0 0,45 Q 0,0 -45,0 Q 0,0 0,-45 Z" fill="#ffffff" />
    <circle cx="0" cy="0" r="10" fill="#ffffff" />
  </g>
</svg>
